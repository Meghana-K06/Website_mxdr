<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><title>Files — SecurBank</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#0f1923;color:#e0e0e0;padding:30px;}
  input{padding:10px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
    border-radius:8px;color:#fff;font-size:0.9rem;width:400px;}
  button{padding:10px 20px;background:#1565c0;color:#fff;border:none;border-radius:8px;
    cursor:pointer;margin-left:10px;}
  pre{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
    border-radius:8px;padding:20px;margin-top:16px;white-space:pre-wrap;
    font-size:0.82rem;max-height:400px;overflow:auto;}
  .error{color:#ef9a9a;margin-top:10px;font-size:0.85rem;}
  a{color:#4fc3f7;text-decoration:none;}
</style></head>
<body>
  <a href="/dashboard">← Back</a>
  <h2 style="margin:20px 0 4px;color:#fff;">📁 File Viewer</h2>
  <p style="color:#90a4ae;margin-bottom:16px;font-size:0.82rem;">Read server-side files by path</p>
  <form method="GET" action="/files">
    <input type="text" name="file" value="{{ file or '' }}"
      placeholder="/etc/passwd  or  ../../.env"/>
    <button type="submit">Read File</button>
  </form>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if content %}<pre>{{ content }}</pre>{% endif %}
</body></html>
