<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><title>Search — SecurBank</title>
<style>
  body{font-family:'Segoe UI',sans-serif;background:#0f1923;color:#e0e0e0;padding:30px;}
  input{padding:10px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);
    border-radius:8px;color:#fff;font-size:0.9rem;width:300px;}
  button{padding:10px 20px;background:#1565c0;color:#fff;border:none;border-radius:8px;
    cursor:pointer;margin-left:10px;}
  table{margin-top:20px;width:100%;border-collapse:collapse;}
  th{background:rgba(255,255,255,0.07);padding:10px;text-align:left;color:#90a4ae;font-size:0.8rem;}
  td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.05);}
  .error{color:#ef9a9a;margin-top:10px;font-size:0.85rem;}
  a{color:#4fc3f7;text-decoration:none;}
</style></head>
<body>
  <a href="/dashboard">← Back</a>
  <h2 style="margin:20px 0 16px;color:#fff;">🔍 User Search</h2>
  <form method="GET" action="/search">
    <input type="text" name="q" value="{{ query or '' }}" placeholder="Search username or name..."/>
    <button type="submit">Search</button>
  </form>
  {% if error %}<div class="error">DB Error: {{ error }}</div>{% endif %}
  {% if results %}
  <table>
    <tr><th>ID</th><th>Username</th><th>Full Name</th><th>Email</th><th>Balance</th></tr>
    {% for u in results %}
    <tr><td>{{u.id}}</td><td>{{u.username}}</td><td>{{u.full_name}}</td>
        <td>{{u.email}}</td><td>${{"%.2f"|format(u.balance)}}</td></tr>
    {% endfor %}
  </table>
  {% endif %}
</body></html>
